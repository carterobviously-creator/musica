<!DOCTYPE html>
<html>
<head>
<title>Music Creator</title>
<style>
    body {
        margin: 0;
        background: #0a0a0f;
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
    }

    #dust {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
    }

    .center-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        width: 500px;
    }

    input {
        width: 100%;
        padding: 15px;
        border-radius: 10px;
        border: none;
        font-size: 18px;
        margin-bottom: 20px;
    }

    button {
        width: 100%;
        padding: 15px;
        border-radius: 10px;
        border: none;
        background: #6a00ff;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }

    #logo {
        margin-top: 30px;
        width: 256px;
        height: 256px;
        border-radius: 20px;
        background: #111;
        display: inline-block;
    }

    #audio {
        margin-top: 20px;
        width: 100%;
    }
</style>
</head>

<body>

<canvas id="dust"></canvas>

<div class="center-box">
    <h1>Music Creator</h1>
    <input id="prompt" placeholder="Describe your track...">
    <button onclick="create()">Create</button>

    <div id="logo"></div>
    <audio id="audio" controls></audio>
</div>

<script>
// MAGIC DUST BACKGROUND
const canvas = document.getElementById("dust");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
for (let i = 0; i < 200; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: Math.random() * 2,
        v: Math.random() * 0.5 + 0.2
    });
}

function animateDust() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.v;
        if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(animateDust);
}
animateDust();

// LOAD LK FILES
let modelLK = null;
let musicLK = null;

async function loadLK() {
    modelLK = await fetch("model.lk").then(r => r.json());
    musicLK = await fetch("musica-small.lk").then(r => r.json());
}
loadLK();

// CREATE BUTTON
async function create() {
    const prompt = document.getElementById("prompt").value;

    generateLogo(prompt);
    generateMusic(prompt);
}

// LOGO GENERATOR
function generateLogo(prompt) {
    const box = document.getElementById("logo");
    const w = modelLK.colorWeights;

    const r = Math.floor(w[0] * 255);
    const g = Math.floor(w[1] * 255);
    const b = Math.floor(w[2] * 255);

    box.style.background = `rgb(${r},${g},${b})`;
}

// REAL AI MUSIC GENERATOR
function tanh(x) {
    return Math.tanh(x);
}

function dense(input, layer) {
    let sum = layer.b[0];
    for (let i = 0; i < input.length; i++) {
        sum += input[i] * layer.w[i];
    }
    return tanh(sum);
}

async function generateMusic(prompt) {
    const latentSize = musicLK.latentSize;
    const layers = musicLK.layers;
    const sampleRate = musicLK.sampleRate;
    const duration = musicLK.duration;

    // RANDOM LATENT VECTOR = DIFFERENT SONG EVERY TIME
    let latent = [];
    for (let i = 0; i < latentSize; i++) {
        latent.push(Math.random() * 2 - 1);
    }

    // RUN THROUGH NETWORK
    let value = latent;
    layers.forEach(layer => {
        value = [dense(value, layer)];
    });

    // TURN INTO AUDIO
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const length = sampleRate * duration;
    const buffer = ctx.createBuffer(1, length, sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < length; i++) {
        data[i] = Math.sin(i * value[0] * 20);
    }

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start();

    document.getElementById("audio").src = "";
}
</script>

</body>
</html>
